<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت اصلی سینمای گروهی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 15px 20px; border-radius: 28px; }
        .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; text-align: center; }
        .stat-card i { font-size: 2rem; color: #f39c12; }
        .rooms-list { background: rgba(0,0,0,0.4); border-radius: 24px; overflow: hidden; margin-bottom: 30px; }
        .room-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px; }
        .room-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; cursor: pointer; }
        .room-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .room-details.show { display: block; }
        .users-list-admin { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 10px; margin-top: 10px; }
        .user-row { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #333; }
        button.small { padding: 4px 10px; font-size: 0.7rem; margin: 0; }
        /* بخش نظرات */
        .feedback-section {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .feedback-item {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #f39c12;
        }
        .feedback-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .feedback-name { font-weight: bold; color: #f39c12; }
        .feedback-date { color: #aaa; }
        .feedback-contact, .feedback-age { font-size: 0.8rem; color: #ccc; margin: 5px 0; }
        .feedback-message { margin-top: 10px; line-height: 1.5; }
        .delete-feedback { background: #e74c3c; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div id="admin-login" class="landing-page" style="display: flex;">
        <div class="glass-card">
            <h1><i class="fas fa-lock"></i> ورود به پنل مدیریت</h1>
            <div class="input-group"><i class="fas fa-key"></i><input type="password" id="admin-password" placeholder="رمز عبور"></div>
            <button id="admin-login-btn" class="btn-primary">ورود</button>
        </div>
    </div>
    <div id="admin-dashboard" style="display: none;">
        <div class="admin-container">
            <div class="admin-header glass-effect">
                <h2><i class="fas fa-shield-alt"></i> پنل مدیریت اصلی سایت</h2>
                <button id="admin-logout" class="icon-btn danger-btn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>

            <!-- بخش اعلان سراسری -->
            <div class="announcement-card" style="background: rgba(0,0,0,0.4); border-radius: 24px; padding: 20px; margin-bottom: 30px;">
                <h3><i class="fas fa-bullhorn"></i> ارسال اعلان سراسری</h3>
                <div class="toggle-switch" style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <span>فعال بودن اعلان:</span>
                    <input type="checkbox" id="announcement-active" style="width: 50px;">
                    <span id="active-status-label">غیرفعال</span>
                </div>
                <textarea id="announcement-text" rows="3" placeholder="پیام خود را بنویسید..." style="width:100%; background:rgba(0,0,0,0.6); border-radius:20px; padding:10px; color:white;"></textarea>
                <button id="send-announcement" class="btn-primary" style="margin-top:10px;">ارسال اعلان</button>
            </div>

            <div class="stats-cards">
                <div class="stat-card"><i class="fas fa-door-open"></i><h3 id="total-rooms">0</h3><p>اتاق فعال</p></div>
                <div class="stat-card"><i class="fas fa-users"></i><h3 id="total-users">0</h3><p>کاربر آنلاین</p></div>
            </div>

            <!-- بخش مدیریت نظرات -->
            <div class="feedback-section">
                <h3><i class="fas fa-comments"></i> مدیریت نظرات کاربران</h3>
                <div id="feedback-list"></div>
            </div>

            <div class="rooms-list glass-effect">
                <h3 style="padding: 15px;"><i class="fas fa-list"></i> لیست اتاق‌ها</h3>
                <div id="rooms-list-container"></div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="admin.js"></script>
</body>
</html>
