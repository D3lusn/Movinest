<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سینمای گروهی | تماشای هماهنگ فیلم</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/128.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="256x256" href="/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="app-container" id="app">
            <!-- صفحه اصلی (Landing) -->
            <div id="landing-page" class="landing-page">
                <div class="glass-card">
                    <div class="chrome-logo">
                        <img src="/logonobg.png" alt="لوگو سینمای گروهی" class="logo-img" width="120" height="120">
                    </div>
                    <h1><i class="fas fa-film"></i> سینمای گروهی</h1>
                    <p class="subtitle">تماشای هماهنگ فیلم با دوستان</p>
                    
                    <div id="username-prompt" style="display: none;">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="temp-username-input" placeholder="نام شما" maxlength="20">
                        </div>
                        <button id="confirm-username-btn" class="btn-primary">تایید و ورود به اتاق</button>
                    </div>

                    <div id="default-buttons">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username-input" placeholder="نام شما" maxlength="20">
                        </div>
                        <button id="create-room-btn" class="btn-primary"><i class="fas fa-plus-circle"></i> ساخت اتاق جدید</button>
                        <div class="divider">یا</div>
                        <div class="input-group">
                            <i class="fas fa-door-open"></i>
                            <input type="text" id="join-room-input" placeholder="کد اتاق (مثل A3B9F2)" maxlength="6" dir="ltr">
                        </div>
                        <button id="join-room-btn" class="btn-secondary"><i class="fas fa-sign-in-alt"></i> ورود به اتاق</button>
                    </div>
                </div>
            </div>

            <!-- صفحه اتاق -->
            <div id="room-page" class="room-page" style="display: none;">
                <div class="room-header glass-effect">
                    <div class="room-info">
                        <span><i class="fas fa-hashtag"></i> کد: <strong id="room-code">----</strong></span>
                        <span><i class="fas fa-users"></i> <span id="user-count">0</span> نفر</span>
                    </div>
                    <div class="room-actions">
                        <button id="copy-room-code" class="icon-btn" title="کپی کد"><i class="fas fa-copy"></i></button>
                        <button id="admin-panel-btn" class="icon-btn admin-btn" style="display:none;" title="پنل ادمین اتاق"><i class="fas fa-crown"></i></button>
                        <button id="leave-room-btn" class="icon-btn danger-btn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
                <div class="player-section">
                    <div class="url-bar">
                        <input type="text" id="video-url" placeholder="لینک ویدیو (یوتیوب، MP4، M3U8، ...)" dir="ltr">
                        <button id="load-video" class="btn-accent"><i class="fas fa-play-circle"></i> بارگذاری (فقط ادمین)</button>
                    </div>
                    <div class="video-wrapper" id="video-wrapper">
                        <div id="player-container"><video id="video-player" class="video-js vjs-default-skin" preload="auto"></video></div>
                    </div>
                </div>
                <div class="chat-section glass-effect">
                    <div class="chat-header"><i class="fas fa-comments"></i> گفتگوی گروهی</div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-container">
                        <input type="text" id="chat-input" placeholder="پیام خود را بنویسید..." maxlength="200">
                        <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- مودال ادمین اتاق -->
        <div id="admin-modal" class="modal-overlay">
            <div class="modal-content glass-card">
                <div class="modal-header"><h3><i class="fas fa-shield-alt"></i> پنل مدیریت اتاق</h3><button id="close-admin-modal" class="close-modal">&times;</button></div>
                <div class="modal-body">
                    <div id="admin-users-list" class="users-list"></div>
                    <hr>
                    <div class="admin-stats"><p><i class="fas fa-users"></i> <span id="admin-user-count">0</span> نفر آنلاین</p></div>
                    <hr>
                    <label><i class="fas fa-clock"></i> زمان ویدیو (ثانیه):</label>
                    <input type="number" id="admin-seek-time" placeholder="مثلاً 120" class="modal-input">
                    <button id="admin-force-seek" class="btn-secondary w-100"><i class="fas fa-forward"></i> انتقال همه به این زمان</button>
                    <button id="admin-force-sync" class="btn-secondary w-100 mt-2"><i class="fas fa-sync-alt"></i> فورس سینک</button>
                    <button id="admin-refresh-users" class="btn-secondary w-100 mt-2"><i class="fas fa-refresh"></i> بروزرسانی کاربران</button>
                </div>
            </div>
        </div>

        <!-- مودال فرم ثبت نظر -->
        <div id="feedback-modal" class="modal-overlay">
            <div class="modal-content glass-card" style="max-width: 500px;">
                <div class="modal-header">
                    <h3><i class="fas fa-pen-alt"></i> ثبت نظر و پیشنهاد</h3>
                    <button class="close-modal close-feedback-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="feedback-form">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fb-name" placeholder="نام شما *" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-address-card"></i>
                            <input type="text" id="fb-contact" placeholder="راه ارتباطی (ایمیل / تلگرام / شماره)">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="number" id="fb-age" placeholder="سن (اختیاری)">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-comment"></i>
                            <textarea id="fb-message" rows="4" placeholder="نظر، انتقاد یا پیشنهاد شما *" required style="width:100%; background:transparent; border:none; color:white; resize:vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn-primary w-100">ارسال نظر</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- دکمه شناور تلگرام -->
        <div class="telegram-float">
            <a href="https://t.me/movinestir" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram-plane"></i> کانال تلگرام
            </a>
        </div>

        <!-- فوتر با ساختار یکسان برای هر دو بخش -->
        <footer class="modern-footer">
            <div class="footer-content">
                <!-- بخش نظرات -->
                <div class="footer-section">
                    <h3><i class="fas fa-comment-dots"></i> نظرت رو با ما به اشتراک بذار</h3>
                    <p>پیشنهادات، انتقادات یا تجربه‌ات از <strong>تماشای فیلم با دوستان</strong> برامون مهمه</p>
                    <button id="open-feedback-btn" class="feedback-link"><i class="fas fa-pen-alt"></i> برای ثبت نظر کلیک کنید</button>
                </div>

                <!-- بخش دعوت به فیلم دیدن (با همین فرمت) - فقط در صفحه اصلی نمایش داده می‌شود -->
            </div>
            <div class="footer-bottom">
                <p>تمامی حقوق محفوظ است - مووینست © 2026 ساخته شده با <i class="fas fa-heart" style="color: #ff3b7f;"></i> در 
                    <picture>
                        <source srcset="/IRANFLAG620x512.png" media="(min-width: 768px)">
                        <img src="/IRANFLAG310x256.png" alt="ایران" style="width: 20px; height: auto; display: inline-block; vertical-align: middle;">
                    </picture>
                    ایران
                </p>
            </div>
        </footer>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@6.0.0/dist/videojs-contrib-hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
